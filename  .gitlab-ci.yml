stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  image: oven/bun:latest
  script:
    - bun install
    - bun build ./index.ts --outdir ./out --target bun
  artifacts:
    paths:
      - out/        
      - node_modules/  

test-job:
  stage: test
  image: oven/bun:latest
  needs: [build]   
  script:
    - bun test

deploy-job:
  stage: deploy
  image: oven/bun:latest
  needs: [build, test]
  only:
    - main         
  script:
    - echo "Deploying to production..."
