version: '3.8'

services:
    db:
        container_name: trello-db
        image: postgres:latest
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: trello
        ports:
            - "5432:5432"
        volumes:
            - db-data:/var/lib/postgresql/trello

volumes:
    db-data: